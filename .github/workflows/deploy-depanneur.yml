name: Deploy Dépanneur OS

on:
  push:
    branches: [main, 'claude/*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: depanneur-os/package-lock.json

      - name: Install and build
        working-directory: depanneur-os
        run: |
          npm ci
          npm run build

      - name: Prepare pages artifact
        run: |
          mkdir -p _site/depanneur-os
          cp index.html _site/
          cp -r depanneur-os/dist/* _site/depanneur-os/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
